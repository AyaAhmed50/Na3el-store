<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/all.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Login Page</title>
</head>
<body>
    <!-- header -->
     <header class="top-0 w-full fixed h-24 bg-slate-100 z-10">
        <!-- Container -->
         <div class="m-auto h-full flex justify-start items-center ">
            <a href="index.html" target="_blank" rel="noopener noreferrer" class="h-full flex items-center">
                <img src="images/E__1_-removebg-preview.png" alt="" srcset=""  class="h-full">
            </a>
         </div>
         <!-- /Container -->
     </header>
     <section class="w-4/6 min-h-1/3 bg-gray-100 absolute top-40 left-1/2 -translate-x-1/2 rounded-md shadow-2xl p-8">
        <form action="">
            <label for="email" class="block mb-2">Email</label>
            <input type="email" name="email" id="email-login" class="block w-full p-2 mb-4 bg-white border-1 border-gray-300 rounded-md" placeholder="Enter Email" required>
            <label for="password" class="block mb-2">Password</label>
            <input type="password" name="password" id="password-login" class = "block w-full p-2 mb-4 bg-white border-1 border-gray-300 rounded-md" placeholder="Enter Password" required>
            <input type="checkbox" name="remind" id="">
            <label for="remind">Remember Me</label>
            <input type="submit" id="login" value="Login" class="block bg-blue-500 text-white p-2 rounded-sm my-2 duration-300 hover:bg-blue-600 hover:cursor-pointer">
            <p class="mt-4">Don't have an Account? <a href="register.html" class="text-blue-500 hover:underline">Register</a></p>
        </form>
     </section>
     <script src="js/login.js"></script>
</body>
</html>
