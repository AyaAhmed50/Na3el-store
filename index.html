<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/all.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Home page</title>
</head>
<body>
    <!-- header -->
     <header class="top-0 w-full fixed h-24 bg-slate-100 z-10">
        <!-- Container -->
         <div class="m-auto h-full flex justify-between items-center ">
            <a href="index.html" target="_blank" rel="noopener noreferrer" class="h-full flex items-center">
                <img src="images/E__1_-removebg-preview.png" alt="" srcset=""  class="h-full">
            </a>
            <!-- user unlogged -->
            <div class="space-x-4 mr-4" id="user-unlogged">
                <a href="login.html" target="_blank" rel="noopener noreferrer"><button class="border-1 border-blue-500 text-blue-500 rounded px-6 py-2 hover:bg-blue-500 hover:text-white duration-300 hover:cursor-pointer">Login</button></a>
                <a href="register.html" target="_blank" rel="noopener noreferrer"><button class="border-1 border-green-500 text-green-500 rounded px-6 py-2 hover:bg-green-500 hover:text-white duration-300 hover:cursor-pointer">Register</button></a>
            </div>
            <!-- user logged -->
            <div id="user_data" class="hidden items-center gap-8 mr-8">
                <p>Hello, <span id="user-name">userName</span></p>
                <div class="text-blue-500 hover:text-blue-600 hover:cursor-pointer">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cart-numb">0</span>
                </div>
                <button id="logout_btn" class="text-red-500 py-2 px-4 border-1 duration-300 border-red-500 rounded-sm hover:bg-red-500 hover:cursor-pointer hover:text-white">Logout</button>
            </div>
         </div>
         <!-- /Container -->
     </header>
     <!-- /header -->
      <section class="mt-24 py-8">
         <!-- container -->
        <div class="w-4/6 m-auto">
            <!-- section heading -->
            <div class="flex justify-between gap-4">
                <select id="filter" name="filter" class="border-1 border-gray-300 rounded-sm py-2 px-4 focus:outline-4 focus:outline-blue-200">
                    <option value="name">Search by Product Name</option>
                    <option value="category">Search by Category</option>
                </select>
                <input type="text" id="search-keyword" placeholder="Search..." class="w-5/6 border-1 border-gray-300 rounded-sm py-2 px-4 outline-blue-200 duration-300 focus:outline-4 focus:outline-blue-200">
                <button class="py-2 px-12 bg-gray-800 rounded-sm text-gray-100 hover:cursor-pointer hover:bg-black hover:text-white duration-300" id="search">Search</button>
            </div>
             <!-- /section heading -->
             <!-- Product-container -->
            <div class="mt-10 grid grid-cols-3 gap-8" id="product-container">
                
            </div>
         </div>
      </section>
      <script src="js/script.js"></script>
</body>
</html>
