<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/all.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Home page</title>
</head>
<body>
    <!-- header -->
     <header class="top-0 w-full fixed h-24 bg-slate-100 z-10 pl-10">
        <!-- Container -->
         <div class="m-auto h-full flex justify-between items-center ">
            <a href="index.html" target="_blank" rel="noopener noreferrer" class="h-full w-40 flex items-center overflow-hidden">
                <img src="images/logo.png" alt="" srcset=""  class="h-40 w-full">
            </a>
            <!-- user unlogged -->
            <div class="space-x-2 mr-4" id="user-unlogged">
                <a href="login.html" target="_blank" rel="noopener noreferrer"><button class="border-1 border-blue-500 text-blue-500 rounded px-6 py-2 hover:bg-blue-500 hover:text-white duration-300 hover:cursor-pointer">Login</button></a>
                <a href="register.html" target="_blank" rel="noopener noreferrer"><button class="border-1 border-green-500 text-green-500 rounded px-6 py-2 hover:bg-green-500 hover:text-white duration-300 hover:cursor-pointer">Register</button></a>
            </div>
            <!-- user logged -->
            <div id="user_data" class="hidden justify-end lg:justify-start lg:gap-8 items-center gap-4 mr-8">
                <p>Hello, <span id="user-name">userName</span></p>
                <div class="text-blue-500 hover:text-blue-600 hover:cursor-pointer relative">
                    <i class="fa-solid fa-cart-shopping" id="cart-summary"></i>
                    <span id="cart-numb">0</span>
                    <!-- side cart -->
                    <div id="side-cart" class="absolute hidden top-10 -left-20 w-64 bg-red-50 rounded-sm">
                        <div id="side-container" class="py-2 space-y-2 text-sky-900">
                            
                        </div>
                        <hr class="text-sky-900">
                        <p class="text-center p-2"><a href="cart.html" target="_blank" rel="noopener noreferrer" class="text-sky-900 hover:text-sky-700">View All Products</a></p>
                    </div>
                </div>
                <button id="logout_btn" class="text-red-500 py-2 px-4 border-1 duration-300 border-red-500 rounded-sm hover:bg-red-500 hover:cursor-pointer hover:text-white">Logout</button>
            </div>
         </div>
         <!-- /Container -->
     </header>
     <!-- /header -->
      <section class="mt-24 py-8">
         <!-- container -->
        <div class="w-5/6 lg:w-5/6  xl:w-4/6 m-auto">
            <!-- section heading -->
            <div class="flex justify-center gap-4">
                <select id="filter" name="filter"  class="w-1/3 border-1 border-gray-300 rounded-sm py-2 px-4 focus:outline-none focus:ring-4 focus:ring-blue-200">
                    <option value="name" class="w-1/3 text-wrap">Search by Product Name</option>
                    <option value="category" class="w-1/3 text-wrap">Search by Category</option>
                </select>
                <input type="text" id="search-keyword" placeholder="Search..." class="md:w-4/6 lg:w-full xl:w-5/6 border-1 border-gray-300 rounded-sm py-2 px-4 focus:outline-none duration-300 focus:ring-4 focus:ring-blue-200">
                <button class="py-2 px-4 md:px-6 lg:px-12 bg-gray-800 rounded-sm text-gray-100 hover:cursor-pointer hover:bg-black hover:text-white duration-300" id="search">Search</button>
            </div>
             <!-- /section heading -->
             <!-- Product-container -->
            <div class="mt-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="product-container">
                
            </div>
         </div>
      </section>
      <script src="js/script.js"></script>
</body>
</html>
