<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/all.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Register Page</title>
</head>
<body>
    <!-- header -->
     <header class="top-0 w-full fixed h-24 bg-slate-100 z-10">
        <!-- Container -->
         <div class="m-auto h-full flex justify-start items-center ">
            <a href="index.html" target="_blank" rel="noopener noreferrer" class="h-full flex items-center">
                <img src="images/E__1_-removebg-preview.png" alt="" srcset=""  class="h-full">
            </a>
         </div>
         <!-- /Container -->
     </header>
     <section class="w-4/6 min-h-1/3 bg-gray-100 absolute top-40 left-1/2 -translate-x-1/2 rounded-md shadow-2xl p-8">
        <form action="" class="flex flex-col space-y-4">
            <!-- name -->
             <div class="flex gap-4">
                <div class="w-3/5">
                    <label for="first-name" class="block mb-2">First Name</label>
                    <input type="text" name="first-name" id="first-name" placeholder="First Name" class="border-1 border-gray-300 bg-gray-50 w-full p-2 rounded-sm" required>
                </div>
                <div class="w-2/5">
                    <label for="last-name" class="block mb-2">Last Name</label>
                    <input type="text" name="last-name" id="last-name" placeholder="last Name" class="w-full border-1 border-gray-300 bg-gray-50 p-2 rounded-sm" required>
                </div>
             </div>
             <div>
                <label for="email" class="block mb-2">Email</label>
                <input type="email" name="email" id="email-register" placeholder="Enter your Email" class="w-full border-1 border-gray-300 bg-gray-50 p-2 rounded-sm" required>
             </div>
             <div>
                <label for="pass" class="block mb-2">Password</label>
                <input type="password" name="pass" id="password-register" placeholder="Enter Password" class="w-full border-1 border-gray-300 bg-gray-50 p-2 rounded-sm" required>
             </div>
             <input type="submit" id="register" value="Register" class="self-start p-2 bg-blue-500 rounded-sm text-gray-50 hover:bg-blue-600 hover:text-white hover:cursor-pointer">
        </form>
        <p class="mt-4">Have an Account? <a href="login.html" target="_blank" rel="noopener noreferrer" class="text-blue-500 hover:underline hover:text-blue-600">Login</a></p>
     </section>
     <script src="js/register.js"></script>
</body>
</html>
