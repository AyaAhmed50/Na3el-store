<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/all.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Cart Page</title>
</head>
<body>
    <!-- header -->
     <header class="top-0 w-full fixed h-24 bg-slate-100 z-10 pl-10">
        <!-- Container -->
         <div class="mx-auto h-full flex justify-between items-center overflow-hidden">
            <a href="index.html" target="_blank" rel="noopener noreferrer" class="h-full w-40 flex items-center">
                <img src="images/logo.png" alt="" srcset=""  class="h-40 w-full">
            </a>
            <!-- user logged -->
            <div class="flex justify-end lg:justify-start lg:gap-8 items-center gap-4 mr-8">
                <p>Hello, <span id="user-name">userName</span></p>
                <div class="text-blue-500 hover:text-blue-600 hover:cursor-pointer">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cart-numb">0</span>
                </div>
                <button id="logout_btn" class="text-red-500 py-2 px-4 border-1 duration-300 border-red-500 rounded-sm hover:bg-red-500 hover:cursor-pointer hover:text-white">Logout</button>
            </div>
         </div>
         <!-- /Container -->
     </header>
     <!-- /header -->
     <!-- cart-products -->
     <section class="mt-30 w-5/6 lg:w-[85%] xl:w-[70%] mx-auto p-8 min-h-30">
        <!-- cart-container -->
        <div class="grid grid-cols-1 lg:grid-cols-2 lg:gap-x-16 xl:gap-x-28 gap-y-10 min-h-20" id="cart-container">
            
        </div>
        <!-- cart-container -->
         <p class="text-2xl text-center font-semibold mt-8">Total Price: <span id="total-price">400</span>$</p>
     </section>
     <!-- cart-products -->
      <hr class="text-gray-200">

      <!-- Favourite-items -->
      <section class="min-h-60 w-[70%] p-8 m-auto">
        <h2 class="relative text-center p-4 text-3xl font-semibold
                    before:absolute 
                    before:w-1/5
                    before:h-[2px]
                    before:bottom-0
                    before:left-1/2
                    before:-translate-x-1/2
                    before:origin-center
                    before:duration-300
                    before:bg-red-500
                    hover:before:w-4/5">Favourite Items</h2>
        
        <!-- Favourite-Container -->
         <div class="overflow-x-auto p-8 flex gap-4" id="favourite-container">
            <!-- Favourite-item -->
            <div class="w-72 min-h-72 shrink-0 flex flex-col items-center border-1 border-gray-300 rounded-sm duration-300 hover:border-2 hover:border-red-500 hover:-translate-y-2 hover:shadow-lg">
                <img src="images/p-1.jpg" alt="" srcset="" class="h-52 w-full rounded-t-sm">
                <!-- Favourite-info -->
                <div class="p-4 flex flex-col space-y-3">
                    <h3 class="font-semibold text-xl">Golden Watch</h3>
                    <p>Category: Watches</p>
                    <i class="fa-solid fa-heart self-center"></i>
                </div>
                <!-- /Favourite-info -->
            </div>
            <!-- /Favourite-item -->
            <!-- Favourite-item -->
            <div class="w-72 min-h-72 shrink-0 flex flex-col items-center border-1 border-gray-300 rounded-sm duration-300 hover:border-2 hover:border-red-500 hover:-translate-y-2 hover:shadow-lg">
                <img src="images/p-1.jpg" alt="" srcset="" class="h-52 w-full rounded-t-sm">
                <!-- Favourite-info -->
                <div class="p-4 flex flex-col space-y-3">
                    <h3 class="font-semibold text-xl">Golden Watch</h3>
                    <p>Category: Watches</p>
                    <i class="fa-solid fa-heart self-center"></i>
                </div>
                <!-- /Favourite-info -->
            </div>
            <!-- /Favourite-item -->
            <!-- Favourite-item -->
            <div class="w-72 min-h-72 shrink-0 flex flex-col items-center border-1 border-gray-300 rounded-sm duration-300 hover:border-2 hover:border-red-500 hover:-translate-y-2 hover:shadow-lg">
                <img src="images/p-1.jpg" alt="" srcset="" class="h-52 w-full rounded-t-sm">
                <!-- Favourite-info -->
                <div class="p-4 flex flex-col space-y-3">
                    <h3 class="font-semibold text-xl">Golden Watch</h3>
                    <p>Category: Watches</p>
                    <i class="fa-solid fa-heart self-center"></i>
                </div>
                <!-- /Favourite-info -->
            </div>
            <!-- /Favourite-item -->
         </div>
         <!-- /Favourite-Container -->
      </section>
      <!-- /Favourite-items -->
      <script src="js/cart.js"></script>
</body>
</html>
